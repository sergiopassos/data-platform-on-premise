apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: bronze-streaming
  namespace: processing
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: apache/spark:3.5.1-python3
  imagePullPolicy: IfNotPresent
  mainApplicationFile: s3a://warehouse/jars/bronze_streaming.py
  sparkVersion: "3.5.1"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 30
    onSubmissionFailureRetries: 3
    onSubmissionFailureRetryInterval: 20
  sparkConf:
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.sql.catalog.nessie: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.nessie.catalog-impl: "org.apache.iceberg.nessie.NessieCatalog"
    spark.sql.catalog.nessie.uri: "http://nessie.infra.svc.cluster.local:19120/api/v1"
    spark.sql.catalog.nessie.ref: "main"
    spark.sql.catalog.nessie.warehouse: "s3a://warehouse/"
    spark.hadoop.fs.s3a.endpoint: "http://minio.infra.svc.cluster.local:9000"
    spark.hadoop.fs.s3a.access.key: "minio"
    spark.hadoop.fs.s3a.secret.key: "minio123"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    spark.jars.packages: >-
      org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,
      org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.80.0,
      org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,
      org.apache.hadoop:hadoop-aws:3.3.4
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1g"
    serviceAccount: spark
    initContainers:
      - name: fetch-contracts
        image: minio/mc:RELEASE.2024-01-13T08-44-48Z
        command: ["/bin/sh", "-c"]
        args:
          - |
            mc alias set minio http://minio.infra.svc.cluster.local:9000 minio minio123 --insecure &&
            mc cp --recursive minio/warehouse/contracts/ /contracts/ || true
        volumeMounts:
          - name: contracts
            mountPath: /contracts
    env:
      - name: KAFKA_BOOTSTRAP
        value: "kafka-cluster-kafka-bootstrap.streaming.svc.cluster.local:9092"
      - name: NESSIE_URI
        value: "http://nessie.infra.svc.cluster.local:19120/api/v1"
      - name: CONTRACTS_DIR
        value: "/contracts"
    volumeMounts:
      - name: contracts
        mountPath: /contracts
  executor:
    cores: 2
    instances: 1
    memory: "2g"
    env:
      - name: KAFKA_BOOTSTRAP
        value: "kafka-cluster-kafka-bootstrap.streaming.svc.cluster.local:9092"
      - name: NESSIE_URI
        value: "http://nessie.infra.svc.cluster.local:19120/api/v1"
      - name: CONTRACTS_DIR
        value: "/contracts"
    volumeMounts:
      - name: contracts
        mountPath: /contracts
  volumes:
    - name: contracts
      emptyDir: {}
