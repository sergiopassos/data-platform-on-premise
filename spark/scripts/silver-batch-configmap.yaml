apiVersion: v1
kind: ConfigMap
metadata:
  name: silver-batch-script
  namespace: processing
data:
  bronze_to_silver.py: |
    """Bronze → Silver MERGE INTO batch job.

    Reads bronze.valid_{table} for a given date and merges into silver.{table}
    using the PK declared in the ODCS contract.
    """
    import argparse
    import os
    from pathlib import Path

    import yaml
    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F

    NESSIE_URI = os.getenv("NESSIE_URI", "http://nessie.infra.svc.cluster.local:19120/api/v1")
    MINIO_ENDPOINT = os.getenv("MINIO_ENDPOINT", "http://minio.infra.svc.cluster.local:9000")
    MINIO_ACCESS_KEY = os.getenv("MINIO_ACCESS_KEY", "minio")
    MINIO_SECRET_KEY = os.getenv("MINIO_SECRET_KEY", "minio123")
    CONTRACTS_DIR = os.getenv("CONTRACTS_DIR", "/contracts")


    def build_spark_session() -> SparkSession:
        return (
            SparkSession.builder.appName("bronze-to-silver")
            .config("spark.sql.extensions", "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions")
            .config("spark.sql.catalog.nessie", "org.apache.iceberg.spark.SparkCatalog")
            .config("spark.sql.catalog.nessie.catalog-impl", "org.apache.iceberg.nessie.NessieCatalog")
            .config("spark.sql.catalog.nessie.uri", NESSIE_URI)
            .config("spark.sql.catalog.nessie.ref", "main")
            .config("spark.sql.catalog.nessie.warehouse", "s3a://warehouse/")
            .config("spark.hadoop.fs.s3a.endpoint", MINIO_ENDPOINT)
            .config("spark.hadoop.fs.s3a.access.key", MINIO_ACCESS_KEY)
            .config("spark.hadoop.fs.s3a.secret.key", MINIO_SECRET_KEY)
            .config("spark.hadoop.fs.s3a.path.style.access", "true")
            .config("spark.hadoop.fs.s3a.impl", "org.apache.hadoop.fs.s3a.S3AFileSystem")
            .getOrCreate()
        )


    def load_primary_keys(table_name: str) -> list[str]:
        contract_path = Path(CONTRACTS_DIR) / f"{table_name}.yaml"
        if not contract_path.exists():
            raise FileNotFoundError(f"Contract not found: {contract_path}")

        with open(contract_path) as f:
            contract = yaml.safe_load(f)

        fields = contract.get("schema", {}).get("fields", [])
        pks = [field["name"] for field in fields if field.get("primaryKey")]

        if not pks:
            raise ValueError(f"No primaryKey fields found in contract for {table_name}")
        return pks


    def ensure_silver_table(spark: SparkSession, table_name: str, source_df_schema: str) -> None:
        spark.sql(f"CREATE NAMESPACE IF NOT EXISTS nessie.silver")
        spark.sql(f"""
            CREATE TABLE IF NOT EXISTS nessie.silver.{table_name}
            USING iceberg
            TBLPROPERTIES ('write.merge.mode'='merge-on-read')
            AS SELECT * FROM nessie.bronze.valid_{table_name} WHERE 1=0
        """)


    def process(spark: SparkSession, table_name: str, processing_date: str, reprocess_invalid: bool = False) -> None:
        source_table = f"nessie.bronze.{'invalid_' if reprocess_invalid else 'valid_'}{table_name}"
        pks = load_primary_keys(table_name)

        source_df = (
            spark.table(source_table)
            .filter(F.to_date("_ingested_at") == processing_date)
        )

        if source_df.isEmpty():
            print(f"No rows in {source_table} for {processing_date}. Skipping.")
            return

        ensure_silver_table(spark, table_name, source_df.schema)

        pk_window = ", ".join(pks)
        dedup_df = spark.sql(f"""
            SELECT * FROM (
                SELECT *,
                    ROW_NUMBER() OVER (PARTITION BY {pk_window} ORDER BY _cdc_ts DESC) AS _rn
                FROM {source_table}
                WHERE to_date(_ingested_at) = '{processing_date}'
            ) WHERE _rn = 1
        """).drop("_rn")

        join_condition = " AND ".join([f"t.{pk} = s.{pk}" for pk in pks])

        dedup_df.createOrReplaceTempView("source_batch")

        spark.sql(f"""
            MERGE INTO nessie.silver.{table_name} AS t
            USING source_batch AS s
            ON {join_condition}
            WHEN MATCHED AND s._cdc_op = 'D' THEN DELETE
            WHEN MATCHED THEN UPDATE SET *
            WHEN NOT MATCHED THEN INSERT *
        """)

        print(f"Silver MERGE complete for {table_name} on {processing_date}.")


    def main() -> None:
        parser = argparse.ArgumentParser()
        parser.add_argument("--table", required=True)
        parser.add_argument("--date", required=True, help="Processing date YYYY-MM-DD")
        parser.add_argument("--reprocess-invalid", action="store_true", default=False)
        args = parser.parse_args()

        spark = build_spark_session()
        process(spark, args.table, args.date, args.reprocess_invalid)


    if __name__ == "__main__":
        main()
