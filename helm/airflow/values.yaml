executor: KubernetesExecutor

images:
  airflow:
    repository: apache/airflow
    tag: 2.9.3-python3.11
    pullPolicy: IfNotPresent

extraPipPackages:
  - "astronomer-cosmos==1.5.0"
  - "dbt-core==1.8.0"
  - "dbt-trino==1.8.0"
  - "apache-airflow-providers-cncf-kubernetes==8.4.1"
  - "apache-airflow-providers-trino==5.7.0"

# ── DAGs — synced from Git via sidecar ────────────────────────────────
dags:
  persistence:
    enabled: true
    size: 2Gi
  gitSync:
    enabled: true
    repo: git@github.com:sergiopassos/data-platform-on-premise.git
    branch: main
    subPath: dags
    wait: 60
    # Secret must have key 'gitSshKey' — created by bootstrap.sh
    sshKeySecret: airflow-git-ssh

logs:
  persistence:
    enabled: false

# ── dbt project — populated by initContainer on scheduler start ────────
extraVolumes:
  - name: dbt-project
    persistentVolumeClaim:
      claimName: airflow-dbt-pvc
  - name: git-ssh
    secret:
      secretName: airflow-git-ssh
      defaultMode: 0400

extraVolumeMounts:
  - name: dbt-project
    mountPath: /opt/airflow/dbt

scheduler:
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
  # Clone dbt/ from Git into the PVC once at pod start
  extraInitContainers:
    - name: git-clone-dbt
      image: alpine/git:2.43.0
      command:
        - sh
        - -c
        - |
          mkdir -p /root/.ssh
          cp /git-ssh/gitSshKey /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          ssh-keyscan -H github.com >> /root/.ssh/known_hosts 2>/dev/null
          git clone --depth=1 --filter=blob:none --no-checkout \
            git@github.com:sergiopassos/data-platform-on-premise.git /tmp/repo
          cd /tmp/repo
          git sparse-checkout init --cone
          git sparse-checkout set dbt
          git checkout
          cp -rT /tmp/repo/dbt /opt/airflow/dbt
          echo "dbt project synced to /opt/airflow/dbt"
      volumeMounts:
        - name: dbt-project
          mountPath: /opt/airflow/dbt
        - name: git-ssh
          mountPath: /git-ssh

webserver:
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi

workers:
  resources:
    requests:
      memory: 1Gi
      cpu: 500m

env:
  - name: AIRFLOW_CONN_TRINO_DEFAULT
    value: "trino://trino.serving.svc.cluster.local:8080/iceberg"
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "false"
  - name: AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE
    value: "orchestration"

podTemplate: |
  apiVersion: v1
  kind: Pod
  metadata:
    name: placeholder
  spec:
    serviceAccountName: airflow-worker
    containers:
      - name: base
        image: apache/airflow:2.9.3-python3.11

rbac:
  create: true

serviceAccount:
  create: true
  name: airflow-worker

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "latest"

redis:
  enabled: false
