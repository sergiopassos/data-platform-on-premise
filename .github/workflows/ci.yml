name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.13-${{ hashFiles('agents/requirements.txt', 'portal/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-3.13-

      - name: Install dependencies
        run: pip install ruff pytest pytest-asyncio -r agents/requirements.txt -r portal/requirements.txt

      - name: Lint (ruff)
        run: ruff check agents/ portal/ tests/

      - name: Unit tests
        run: pytest tests/unit/ -q
