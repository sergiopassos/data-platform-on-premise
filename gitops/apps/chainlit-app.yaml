apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chainlit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sergiopassos/data-platform-on-premise
    targetRevision: HEAD
    path: helm/chainlit
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
