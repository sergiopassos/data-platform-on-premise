apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: data-platform
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
  - role: worker
    extraMounts:
      - hostPath: /tmp/data-platform/worker1
        containerPath: /data
  - role: worker
    extraMounts:
      - hostPath: /tmp/data-platform/worker2
        containerPath: /data
