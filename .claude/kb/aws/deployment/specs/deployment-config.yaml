schema_version: "1.0"
domain: aws-deployment
file_type: deployment-config
last_validated: "2026-02-17"
source: "AWS SAM CLI documentation, AWS CLI S3 reference"

# Deployment Configuration Spec
# Defines the structure for samconfig.toml and deployment parameters

records:
  samconfig:
    description: "SAM CLI configuration file structure (samconfig.toml)"
    fields:
      version:
        type: string
        required: true
        default: "0.1"
        validation:
          - "Must be '0.1' (current SAM config version)"
        notes: "Top-level version field"

      config_env:
        type: string
        required: true
        default: "default"
        validation:
          - "One of: default, dev, staging, prod"
          - "Maps to --config-env CLI flag"
        notes: "Environment section identifier in samconfig.toml"

      stack_name:
        type: string
        required: true
        default: "myapp-dev"
        validation:
          - "Must be unique per environment"
          - "Pattern: {app}-{env}"
          - "Max 128 characters, alphanumeric and hyphens"
        notes: "CloudFormation stack name"

      s3_bucket:
        type: string
        required: true
        default: "myapp-sam-artifacts-dev"
        validation:
          - "Must exist in target region"
          - "Pattern: {app}-sam-artifacts-{env}"
          - "Globally unique bucket name"
        notes: "S3 bucket for deployment artifacts"

      s3_prefix:
        type: string
        required: false
        default: "myapp"
        validation:
          - "No leading slash"
        notes: "S3 key prefix for artifact organization"

      region:
        type: string
        required: true
        default: "us-east-1"
        validation:
          - "Valid AWS region code"
          - "Pattern: {area}-{direction}-{number}"
        notes: "AWS deployment region"

      capabilities:
        type: string
        required: true
        default: "CAPABILITY_IAM"
        validation:
          - "One or more of: CAPABILITY_IAM, CAPABILITY_NAMED_IAM, CAPABILITY_AUTO_EXPAND"
          - "Space-separated values"
        notes: "CloudFormation IAM capabilities"

      confirm_changeset:
        type: boolean
        required: false
        default: "true"
        validation:
          - "Set to false for dev, true for staging/prod"
        notes: "Whether to prompt before applying changes"

      parameter_overrides:
        type: array
        required: false
        default: "[]"
        validation:
          - "Format: Key=Value"
          - "Must match template Parameters section"
        notes: "CloudFormation parameter overrides"

  template_parameters:
    description: "Common template.yaml Parameters for multi-env deployments"
    fields:
      Environment:
        type: string
        required: true
        default: "dev"
        validation:
          - "AllowedValues: dev, staging, prod"
        notes: "Used in resource naming via !Sub"

      LogLevel:
        type: string
        required: false
        default: "INFO"
        validation:
          - "AllowedValues: DEBUG, INFO, WARNING, ERROR"
        notes: "Lambda function log verbosity"

      MemorySize:
        type: integer
        required: false
        default: "256"
        validation:
          - "AllowedValues: 128, 256, 512, 1024, 2048, 3008"
          - "In MB"
        notes: "Lambda function memory allocation"

      Timeout:
        type: integer
        required: false
        default: "30"
        validation:
          - "Range: 1-900"
          - "In seconds"
        notes: "Lambda function timeout"

  s3_operations:
    description: "S3 CLI operation parameters"
    fields:
      sync_delete:
        type: boolean
        required: false
        default: "false"
        validation:
          - "When true, removes destination files not in source"
          - "Always dry-run first with --dryrun"
        notes: "Dangerous: can delete production data"

      exclude_patterns:
        type: array
        required: false
        default: '["*.pyc", "__pycache__/*", ".git/*", "*.env"]'
        validation:
          - "Glob patterns"
          - "Applied before --include"
        notes: "Files to skip during sync/cp"

      storage_class:
        type: string
        required: false
        default: "STANDARD"
        validation:
          - "One of: STANDARD, REDUCED_REDUNDANCY, STANDARD_IA, ONEZONE_IA, INTELLIGENT_TIERING, GLACIER, DEEP_ARCHIVE"
        notes: "S3 storage tier for cost optimization"

      presign_expiry:
        type: integer
        required: false
        default: "3600"
        validation:
          - "Range: 1-604800 (max 7 days)"
          - "In seconds"
        notes: "Pre-signed URL expiration time"

# Environment Matrix
environments:
  dev:
    stack_name_pattern: "{app}-dev"
    confirm_changeset: false
    memory_size: 256
    log_level: DEBUG
    provisioned_concurrency: 0
    alarms: false

  staging:
    stack_name_pattern: "{app}-staging"
    confirm_changeset: true
    memory_size: 512
    log_level: INFO
    provisioned_concurrency: 0
    alarms: true

  prod:
    stack_name_pattern: "{app}-prod"
    confirm_changeset: true
    memory_size: 1024
    log_level: WARNING
    provisioned_concurrency: 5
    alarms: true
    deployment_preference: Canary10Percent5Minutes
