schema_version: "1.0"
domain: python-clean-code
file_type: code-standards
last_validated: "2026-02-17"
source: "PEP 8, PEP 484, PEP 585, PEP 604, PEP 673, PEP 695, mypy, ruff"

python:
  minimum_version: "3.11"
  preferred_version: "3.12"
  target_versions:
    - "3.11"
    - "3.12"
    - "3.13"

style:
  formatter: "ruff format"
  linter: "ruff check"
  line_length: 88
  indent: 4
  quote_style: "double"
  trailing_comma: true
  docstring_style: "google"

type_hints:
  enforced: true
  tool: "mypy"
  strict_mode: true
  rules:
    - "Use `X | Y` instead of `Union[X, Y]` (PEP 604, 3.10+)"
    - "Use `X | None` instead of `Optional[X]` (PEP 604, 3.10+)"
    - "Use `list[int]` instead of `List[int]` (PEP 585, 3.9+)"
    - "Use `Self` for methods returning own class (PEP 673, 3.11+)"
    - "Use `type X = ...` for type aliases (PEP 695, 3.12+)"
    - "Use `def fn[T](x: T)` for generics (PEP 695, 3.12+)"
    - "All public functions must have return type annotations"
    - "All public function parameters must have type annotations"

dataclasses:
  preferred_options:
    slots: true
    frozen: "when immutability needed"
    kw_only: "when more than 3 fields"
  rules:
    - "Always use `field(default_factory=...)` for mutable defaults"
    - "Prefer `tuple` over `list` for frozen dataclass fields"
    - "Use `__post_init__` for derived fields, not `__init__`"
    - "Use `Self` return type for builder methods"

naming:
  modules: "snake_case"
  classes: "PascalCase"
  functions: "snake_case"
  constants: "UPPER_SNAKE_CASE"
  private: "_leading_underscore"
  type_aliases: "PascalCase"
  booleans: "is_/has_/can_/should_ prefix"
  rules:
    - "Names must be descriptive and intention-revealing"
    - "Avoid single-letter names except in comprehensions and lambdas"
    - "No abbreviations unless universally understood (db, api, url, id)"

functions:
  max_lines: 30
  max_parameters: 5
  max_nesting_depth: 3
  rules:
    - "Single responsibility per function"
    - "Use keyword-only arguments after `*` for clarity"
    - "Prefer early returns over deep nesting"
    - "Use `-> None` explicitly for functions that return nothing"
    - "Docstring required for all public functions (Google style)"

error_handling:
  rules:
    - "Never use bare `except:` or `except Exception:`"
    - "Always chain exceptions with `raise X from original`"
    - "Define custom exception hierarchy with base AppError"
    - "Log at error boundaries, not at raise sites"
    - "Use `contextlib.suppress()` for intentional exception ignoring"
    - "Validate inputs early, fail fast"

imports:
  order:
    - "stdlib"
    - "third-party"
    - "local"
  rules:
    - "Never use `from x import *`"
    - "Group imports by category with blank line between groups"
    - "Use absolute imports for clarity"
    - "Let ruff/isort handle import ordering"

testing:
  framework: "pytest"
  rules:
    - "Test file naming: `test_{module}.py`"
    - "Test function naming: `test_{function}_{scenario}_{expected}`"
    - "One assertion per test when practical"
    - "Use fixtures for setup, not setUp/tearDown"
    - "Use `@pytest.mark.parametrize` for multiple inputs"
    - "Use `tmp_path` fixture for file system tests"
    - "Use dataclasses for test fixtures"

project_structure:
  layout: "src-layout"
  config_file: "pyproject.toml"
  rules:
    - "Use src/ layout for packages"
    - "All config in pyproject.toml (no setup.py, setup.cfg)"
    - "Domain layer has zero external dependencies"
    - "Adapters implement Protocol interfaces"
    - "No circular imports between modules"

ruff:
  config:
    select:
      - "E"    # pycodestyle errors
      - "F"    # pyflakes
      - "I"    # isort
      - "N"    # pep8-naming
      - "UP"   # pyupgrade
      - "B"    # flake8-bugbear
      - "SIM"  # flake8-simplify
      - "RUF"  # ruff-specific
      - "ANN"  # flake8-annotations
      - "C4"   # flake8-comprehensions
      - "PT"   # flake8-pytest-style
    ignore:
      - "ANN101"  # missing self annotation
      - "ANN102"  # missing cls annotation
