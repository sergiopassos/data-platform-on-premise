schema_version: "1.0"
domain: prompt-engineering
file_type: prompt-format-specification
last_validated: "2026-03-26"
source: "MCP validated: Exa WebSearch, Anthropic Docs, OpenAI Docs"

# Prompt Format Specification
# Defines the canonical structure for prompts in this knowledge base

prompt_structure:
  description: "Standard prompt anatomy for extraction and structured output tasks"
  sections:
    system_prompt:
      position: 1
      required: true
      type: string
      description: "Role, persona, and behavioral constraints"
      max_length_tokens: 500
      fields:
        role:
          type: string
          required: true
          description: "Expert domain and persona"
          validation:
            - "Must be specific (not 'helpful assistant')"
            - "Should name the domain expertise"
        constraints:
          type: list
          required: true
          description: "Behavioral guardrails and limitations"
          validation:
            - "Must include at least one negative constraint (NEVER)"
            - "Must include output format rule"
        quality_rules:
          type: list
          required: false
          description: "Standards for output quality"

    task_definition:
      position: 2
      required: true
      type: string
      description: "Clear statement of what the LLM should do"
      max_length_tokens: 200
      validation:
        - "Must be actionable (starts with verb)"
        - "Must be specific to a single task"

    schema_or_format:
      position: 3
      required: true
      type: object
      description: "Expected output structure"
      formats:
        json_schema:
          description: "Pydantic model JSON schema"
          validation:
            - "All fields must have type annotations"
            - "Required vs optional must be explicit"
        field_list:
          description: "Named fields with descriptions"
          validation:
            - "Each field must have a type and description"

    rules:
      position: 4
      required: true
      type: list
      description: "Extraction and formatting rules"
      validation:
        - "Must include null handling rule"
        - "Must include date format rule if dates are expected"
        - "Must include numeric format rule if amounts are expected"

    examples:
      position: 5
      required: false
      type: list
      description: "Few-shot examples for format demonstration"
      validation:
        - "All examples must use the same output format"
        - "Include at least one edge case example"
        - "Minimum 1, maximum 5 examples"

    input_section:
      position: 6
      required: true
      type: string
      description: "Placeholder for the actual input data"
      validation:
        - "Must use a clear delimiter (## Document, ## Input, etc.)"
        - "Must be the last section before output instruction"

    output_instruction:
      position: 7
      required: true
      type: string
      description: "Explicit instruction for response format"
      validation:
        - "Must say 'Return ONLY' or equivalent"
        - "Must reference the schema defined above"

# Temperature Settings
temperature_guide:
  extraction: 0.0
  classification: 0.0
  summarization: 0.3
  creative: 0.7
  code_generation: 0.0
  brainstorming: 0.9

# Model Recommendations
model_recommendations:
  extraction:
    primary: "claude-sonnet-4-6"
    alternatives: ["gpt-4o", "gemini-2.5-pro"]
    notes: "Use tool-use-as-schema (Claude) or JSON Schema mode (OpenAI)"
  classification:
    primary: "gpt-4o-mini"
    alternatives: ["claude-haiku-3-5", "gemini-2.0-flash"]
    notes: "Cheaper models sufficient for classification"
  summarization:
    primary: "claude-sonnet-4-6"
    alternatives: ["gpt-4o", "gemini-2.5-pro"]
    notes: "Balance quality and cost"
  structured_output:
    primary: "gpt-4o"
    alternatives: ["claude-sonnet-4-6"]
    notes: "OpenAI JSON Schema mode (strict) or Instructor library"
    library: "instructor"

# Validation Checklist
validation_checklist:
  structure:
    - "System prompt defines role and constraints"
    - "Task is explicit and actionable"
    - "Output format is specified with schema"
    - "Rules cover edge cases (null, dates, amounts)"
  quality:
    - "Temperature matches task type"
    - "JSON mode enabled for structured output"
    - "Pydantic validation on response"
    - "Retry logic for validation failures"
  production:
    - "Prompt is version-controlled"
    - "Test cases cover edge cases"
    - "Token usage is monitored"
    - "Error handling is implemented"
