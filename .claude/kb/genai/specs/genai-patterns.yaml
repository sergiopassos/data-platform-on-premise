schema_version: "1.0"
domain: genai
file_type: architecture_patterns
last_validated: "2026-03-26"
source: "MCP validated - Exa WebSearch, Context7, Anthropic Docs"

# GenAI Architecture Patterns Specification
# Machine-readable reference for agent decision-making

orchestration_patterns:
  sequential:
    description: "Linear chain of agents processing in order"
    topology: "chain"
    complexity: "low"
    latency: "high"
    cost: "low"
    fault_tolerance: "low"
    use_cases:
      - "Step-by-step document processing"
      - "Multi-stage data transformation"
      - "Content generation pipelines"
    frameworks:
      - "LangChain"
      - "LangGraph"

  concurrent:
    description: "Multiple agents process in parallel, results merged"
    topology: "fan-out-fan-in"
    complexity: "medium"
    latency: "low"
    cost: "high"
    fault_tolerance: "medium"
    use_cases:
      - "Parallel research across sources"
      - "Multi-perspective analysis"
      - "Ensemble generation"
    frameworks:
      - "LangGraph"
      - "CrewAI"

  hub_and_spoke:
    description: "Central orchestrator dispatches to specialized agents"
    topology: "star"
    complexity: "medium"
    latency: "medium"
    cost: "medium"
    fault_tolerance: "medium"
    use_cases:
      - "Customer support routing"
      - "Multi-intent classification"
      - "Centralized task management"
    frameworks:
      - "OpenAI Agents SDK"
      - "LangGraph"
      - "AutoGen"

  mesh:
    description: "Peer-to-peer agent communication without central control"
    topology: "peer-to-peer"
    complexity: "high"
    latency: "medium"
    cost: "high"
    fault_tolerance: "high"
    use_cases:
      - "Distributed research teams"
      - "Self-healing monitoring"
      - "Resilient systems"
    frameworks:
      - "AutoGen"
      - "CrewAI"

  plan_and_execute:
    description: "Frontier model plans, cheaper models execute steps"
    topology: "hierarchical"
    complexity: "high"
    latency: "variable"
    cost: "low"
    fault_tolerance: "medium"
    cost_reduction: "up to 90% vs frontier-for-everything"
    use_cases:
      - "Complex multi-step research"
      - "Cost-optimized workflows"
      - "Tasks with clear decomposition"
    frameworks:
      - "LangGraph"
      - "OpenAI Agents SDK"

rag_variants:
  naive_rag:
    description: "Single retrieval step followed by generation"
    stages: ["retrieve", "generate"]
    complexity: "low"
    best_for: "Simple Q&A"

  advanced_rag:
    description: "Pre/post-retrieval optimization with reranking"
    stages: ["query_transform", "retrieve", "rerank", "generate"]
    complexity: "medium"
    best_for: "Production systems"

  modular_rag:
    description: "Swappable LEGO-style components"
    stages: ["configurable"]
    complexity: "medium"
    best_for: "Flexible experimentation"

  self_rag:
    description: "Self-reflective retrieval with quality checks"
    stages: ["retrieve", "evaluate_relevance", "generate", "evaluate_output"]
    complexity: "high"
    best_for: "High-accuracy requirements"

  corrective_rag:
    description: "Verify retrieval quality, re-retrieve if needed"
    stages: ["retrieve", "verify", "re-retrieve_if_needed", "generate"]
    complexity: "high"
    best_for: "Critical applications"

  graph_rag:
    description: "Knowledge graph augmented retrieval"
    stages: ["extract_entities", "graph_traverse", "retrieve", "generate"]
    complexity: "high"
    best_for: "Relational reasoning"

  agentic_rag:
    description: "Agent decides when and what to retrieve"
    stages: ["reason", "decide_retrieval", "retrieve", "generate"]
    complexity: "high"
    best_for: "Complex multi-hop queries"

evaluation_metrics:
  faithfulness:
    description: "Fraction of claims grounded in retrieved context"
    range: "0.0 - 1.0"
    framework: "RAGAS"
    production_threshold: 0.85

  answer_relevancy:
    description: "How well the answer addresses the question"
    range: "0.0 - 1.0"
    framework: "RAGAS"
    production_threshold: 0.80

  context_precision:
    description: "Fraction of retrieved chunks that are relevant"
    range: "0.0 - 1.0"
    framework: "RAGAS"
    production_threshold: 0.75

  context_recall:
    description: "Coverage of ground truth in retrieved context"
    range: "0.0 - 1.0"
    framework: "RAGAS"
    requires_ground_truth: true
    production_threshold: 0.75

  toxicity:
    description: "Presence of harmful or inappropriate content"
    range: "0.0 - 1.0"
    framework: "Langfuse"
    production_threshold: 0.05
    note: "Lower is better"

guardrail_types:
  input_rails:
    stage: "pre-llm"
    latency: "50-300ms"
    types:
      - name: "jailbreak_detection"
        technique: "Llama Guard classifier"
      - name: "pii_redaction"
        technique: "Regex + NER"
      - name: "topic_control"
        technique: "LLM classifier"

  retrieval_rails:
    stage: "mid-pipeline"
    latency: "10-50ms"
    types:
      - name: "relevance_filter"
        technique: "Similarity threshold"
      - name: "content_safety"
        technique: "Classifier on chunks"

  output_rails:
    stage: "post-llm"
    latency: "50-500ms"
    types:
      - name: "factuality_check"
        technique: "LLM-as-judge"
      - name: "toxicity_filter"
        technique: "Classifier"
      - name: "format_validation"
        technique: "JSON Schema / Pydantic"

tool_calling_protocols:
  openai:
    format: "tools array"
    schema: "JSON Schema"
    parallel_calls: true
    max_tools: 128
    streaming: true

  anthropic:
    format: "tools array"
    schema: "JSON Schema"
    parallel_calls: true
    max_tools: 64
    streaming: true

  google:
    format: "tools array"
    schema: "JSON Schema"
    parallel_calls: true
    max_tools: 64
    streaming: true

  mcp:
    format: "server-defined"
    schema: "JSON Schema"
    transport: "Streamable HTTP (2025 revision)"
    discovery: "dynamic"
    maintainer: "Anthropic (open standard)"

frameworks_2026:
  langgraph:
    maintainer: "LangChain"
    strength: "Graph-based state machines, durable execution, human-in-the-loop, memory"
    language: "Python, TypeScript"
    production_ready: true
    mcp_support: true

  crewai:
    maintainer: "CrewAI Inc"
    strength: "Role-based agent crews, rapid prototyping"
    language: "Python"
    production_ready: true
    mcp_support: true

  claude_agent_sdk:
    maintainer: "Anthropic"
    strength: "Claude Code capabilities as library, security-first, MCP native"
    language: "Python, TypeScript"
    production_ready: true
    mcp_support: true

  openai_agents_sdk:
    maintainer: "OpenAI"
    strength: "Handoff-based delegation, tracing, guardrails"
    language: "Python"
    production_ready: true
    replaces: "Swarm (experimental)"
    mcp_support: true

  autogen:
    maintainer: "Microsoft"
    strength: "Enterprise multi-agent, Semantic Kernel integration"
    language: "Python, C#"
    production_ready: true
    mcp_support: true

  agno:
    maintainer: "Agno"
    strength: "Minimal code agents, model-agnostic, fastest setup"
    language: "Python"
    production_ready: true
    mcp_support: true

  dspy:
    maintainer: "Stanford NLP"
    strength: "Automated prompt optimization, self-improving"
    language: "Python"
    production_ready: true

  llamaindex:
    maintainer: "LlamaIndex"
    strength: "RAG-first, data connectors, indexing"
    language: "Python, TypeScript"
    production_ready: true

decision_matrix:
  - use_case: "Simple Q&A over documents"
    recommended_pattern: "naive_rag or advanced_rag"
    recommended_framework: "LlamaIndex"

  - use_case: "Multi-step research task"
    recommended_pattern: "plan_and_execute"
    recommended_framework: "LangGraph"

  - use_case: "Customer support chatbot"
    recommended_pattern: "hub_and_spoke + state_machine + rag"
    recommended_framework: "LangGraph + NeMo Guardrails"

  - use_case: "Data pipeline monitoring"
    recommended_pattern: "mesh or hub_and_spoke"
    recommended_framework: "CrewAI"

  - use_case: "Content generation pipeline"
    recommended_pattern: "sequential"
    recommended_framework: "LangChain"

  - use_case: "Complex multi-hop reasoning"
    recommended_pattern: "agentic_rag + plan_and_execute"
    recommended_framework: "LangGraph"
