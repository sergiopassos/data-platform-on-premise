schema_version: "1.0"
domain: medallion-architecture
file_type: architecture-config
last_validated: "2026-02-17"
source: "Databricks Medallion Architecture, Delta Lake documentation"

# ── Architecture Configuration ────────────────────────────────

architecture:
  name: "Medallion Architecture"
  description: "Multi-hop data architecture with Bronze, Silver, and Gold layers"
  layers:
    - name: bronze
      purpose: "Raw ingestion, append-only, schema-on-read"
      write_mode: append
      schema_enforcement: false
      merge_schema: true
      deduplication: false
      retention_days: 730   # 2 years
    - name: silver
      purpose: "Cleansed, deduplicated, conformed data"
      write_mode: merge
      schema_enforcement: true
      merge_schema: false
      deduplication: true
      retention_days: 365
    - name: gold
      purpose: "Business aggregations, star schemas, KPIs"
      write_mode: overwrite
      schema_enforcement: true
      merge_schema: false
      deduplication: false
      retention_days: 180

# ── Naming Conventions ────────────────────────────────────────

naming:
  database:
    pattern: "{layer}_{domain}"
    examples:
      - "bronze_sales"
      - "silver_sales"
      - "gold_sales"
  tables:
    bronze:
      pattern: "raw_{source}_{entity}"
      examples:
        - "raw_api_orders"
        - "raw_sftp_payments"
    silver:
      pattern: "cleansed_{entity}"
      examples:
        - "cleansed_orders"
        - "cleansed_payments"
    gold:
      dimensions: "dim_{entity}"
      facts: "fact_{entity}"
      aggregates: "agg_{metric}"
      examples:
        - "dim_customers"
        - "fact_orders"
        - "agg_daily_revenue"

# ── Metadata Columns ─────────────────────────────────────────

metadata_columns:
  bronze:
    required:
      - name: "_ingested_at"
        type: "TIMESTAMP"
        description: "When the record was ingested"
      - name: "_source_file"
        type: "STRING"
        description: "Source file path"
      - name: "_source_system"
        type: "STRING"
        description: "Source system identifier"
  silver:
    required:
      - name: "_created_at"
        type: "TIMESTAMP"
        description: "When record first appeared in Silver"
      - name: "_updated_at"
        type: "TIMESTAMP"
        description: "Last update timestamp"
    optional:
      - name: "is_current"
        type: "BOOLEAN"
        description: "SCD Type 2 current flag"
      - name: "valid_from"
        type: "TIMESTAMP"
        description: "SCD Type 2 valid from"
      - name: "valid_to"
        type: "TIMESTAMP"
        description: "SCD Type 2 valid to"
  gold:
    required:
      - name: "_computed_at"
        type: "TIMESTAMP"
        description: "When aggregation was computed"

# ── Quality Gates ─────────────────────────────────────────────

quality:
  default_threshold: 0.99
  quarantine_enabled: true
  quarantine_database: "quarantine"
  checks:
    - name: "not_null"
      description: "Column value is not null"
      severity: "critical"
    - name: "positive"
      description: "Numeric column is greater than zero"
      severity: "warning"
    - name: "unique"
      description: "Column values are unique within partition"
      severity: "critical"
    - name: "referential"
      description: "Foreign key exists in referenced table"
      severity: "warning"
    - name: "range"
      description: "Value falls within expected range"
      severity: "warning"
    - name: "regex"
      description: "Value matches expected pattern"
      severity: "info"

# ── Delta Lake Settings ───────────────────────────────────────

delta:
  auto_optimize:
    optimize_write: true
    auto_compact: true
  vacuum:
    retention_hours: 168   # 7 days minimum
    schedule: "daily"
  z_order:
    bronze: []             # no z-order on Bronze
    silver: ["business_key"]
    gold: ["common_filter_columns"]
  change_data_feed:
    silver: true           # enable CDF on Silver for Gold incremental
    gold: false

# ── Schema Evolution ─────────────────────────────────────────

schema_evolution:
  bronze:
    auto_merge: true
    column_mapping: false
  silver:
    auto_merge: false
    column_mapping: true
    column_mapping_mode: "name"
    min_reader_version: 2
    min_writer_version: 5
  gold:
    auto_merge: false
    overwrite_schema: true
