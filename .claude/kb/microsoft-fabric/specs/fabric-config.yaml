# Microsoft Fabric Configuration Reference
# MCP Validated: 2026-02-17

version: "1.0"

# Capacity SKUs
capacity_skus:
  - sku: F2
    cu: 2
    max_concurrent_jobs: 1
    spark_vcores: 8
    use_case: "Dev/test, small workloads"
  - sku: F4
    cu: 4
    max_concurrent_jobs: 2
    spark_vcores: 16
    use_case: "Small team development"
  - sku: F8
    cu: 8
    max_concurrent_jobs: 4
    spark_vcores: 32
    use_case: "Department workloads"
  - sku: F16
    cu: 16
    max_concurrent_jobs: 8
    spark_vcores: 64
    use_case: "Multi-team production"
  - sku: F32
    cu: 32
    max_concurrent_jobs: 16
    spark_vcores: 128
    use_case: "Enterprise workloads"
  - sku: F64
    cu: 64
    max_concurrent_jobs: 32
    spark_vcores: 256
    use_case: "Large-scale analytics"
  - sku: F128
    cu: 128
    max_concurrent_jobs: 64
    spark_vcores: 512
    use_case: "Enterprise-critical"
  - sku: F256
    cu: 256
    max_concurrent_jobs: 128
    spark_vcores: 1024
    use_case: "Massive workloads"
  - sku: F512
    cu: 512
    max_concurrent_jobs: 256
    spark_vcores: 2048
    use_case: "Extreme scale"
  - sku: F1024
    cu: 1024
    max_concurrent_jobs: 512
    spark_vcores: 4096
    use_case: "Maximum capacity"
  - sku: F2048
    cu: 2048
    max_concurrent_jobs: 1024
    spark_vcores: 8192
    use_case: "Largest available"

# Workload Types
workloads:
  lakehouse:
    engine: "Spark (PySpark, Scala, SQL)"
    storage: "Delta Lake (Parquet + transaction log)"
    query_language: "PySpark, Spark SQL"
    partition_syntax: "PARTITIONED BY"  # NOT CLUSTER BY
    best_for: "Data engineering, ETL, ML"
    access_modes:
      - "Spark notebooks"
      - "SQL analytics endpoint (read-only)"
      - "OneLake shortcuts"

  warehouse:
    engine: "Polaris (distributed SQL)"
    storage: "Managed Delta tables"
    query_language: "T-SQL"
    best_for: "BI, reporting, ad-hoc queries"
    security_features:
      - "Row-Level Security (RLS)"
      - "Column-Level Security (CLS)"
      - "Dynamic Data Masking (DDM)"
      - "Object-Level Security (OLS)"

  eventhouse:
    engine: "Kusto (KQL)"
    storage: "Columnar, time-series optimized"
    query_language: "KQL (Kusto Query Language)"
    best_for: "Real-time analytics, monitoring, log analysis"
    ingestion_modes:
      - "Streaming ingestion"
      - "Queued ingestion (batch)"
      - "One-click ingestion"

  data_factory:
    pipeline_types:
      - "Data pipelines (orchestration)"
      - "Dataflow Gen2 (Power Query transformations)"
    copy_activity:
      supported_sources: 170+
      formats: ["Parquet", "CSV", "JSON", "Delta", "Avro", "ORC"]
    best_for: "Data ingestion, orchestration, scheduling"

# Workspace Roles
workspace_roles:
  admin:
    permissions: "Full control, manage access, delete workspace"
    assign_to: "Platform team leads"
  member:
    permissions: "Create/edit items, share items, no workspace deletion"
    assign_to: "Data engineers, analysts"
  contributor:
    permissions: "Create/edit items, no sharing, no access management"
    assign_to: "Developers in shared workspaces"
  viewer:
    permissions: "View items only, no editing"
    assign_to: "Business stakeholders, auditors"

# Deployment Pipeline Stages
deployment_pipeline:
  stages:
    - name: Development
      workspace_suffix: "-dev"
      auto_deploy: true
      rules: "No approval required"
    - name: Test
      workspace_suffix: "-test"
      auto_deploy: false
      rules: "Peer review required"
    - name: Production
      workspace_suffix: "-prod"
      auto_deploy: false
      rules: "Approval gate + change request"

# Security Configuration
security:
  rls:
    definition: "CREATE SECURITY POLICY with filter predicates"
    scope: "Row-level filtering based on user identity"
    applies_to: ["Warehouse tables", "Semantic models"]
  cls:
    definition: "GRANT/DENY SELECT on specific columns"
    scope: "Column visibility based on role"
    applies_to: ["Warehouse tables"]
  ddm:
    functions: ["default()", "email()", "random()", "partial()"]
    override: "GRANT UNMASK permission"
    applies_to: ["Warehouse columns"]

# API Configuration
api:
  base_url: "https://api.fabric.microsoft.com/v1"
  auth:
    type: "OAuth 2.0 (Microsoft Entra ID)"
    scopes:
      - "https://api.fabric.microsoft.com/.default"
    grant_types:
      - "client_credentials (Service Principal)"
      - "authorization_code (User)"
  rate_limits:
    requests_per_minute: 200
    burst: 50

# Critical Rules
rules:
  - id: FABRIC-001
    rule: "Use PARTITIONED BY for Delta tables, NEVER CLUSTER BY"
    severity: critical
    applies_to: "Lakehouse Spark SQL"
  - id: FABRIC-002
    rule: "Always set retention policy on Eventhouse databases"
    severity: high
    applies_to: "Eventhouse KQL databases"
  - id: FABRIC-003
    rule: "Use workspace identity (not personal credentials) for scheduled jobs"
    severity: high
    applies_to: "Pipelines, notebooks, dataflows"
  - id: FABRIC-004
    rule: "Test RLS/CLS with EXECUTE AS before production deployment"
    severity: critical
    applies_to: "Warehouse security"
