# manifests/platform/gemini-api-secret.yaml
#
# Shape documentation for the gemini-api-secret Kubernetes Secret.
#
# NOTE: This file is NOT applied directly. The actual Secret is created
# by cluster/bootstrap.sh (and scripts/bootstrap-cluster.sh) from the
# $GEMINI_API_KEY environment variable so the key never lands in Git.
#
# Consumed by: helm/chainlit/values.yaml -> env.GEMINI_API_KEY via
# secretKeyRef(name=gemini-api-secret, key=api-key).
apiVersion: v1
kind: Secret
metadata:
  name: gemini-api-secret
  namespace: portal
type: Opaque
stringData:
  api-key: "REPLACED_BY_BOOTSTRAP"
